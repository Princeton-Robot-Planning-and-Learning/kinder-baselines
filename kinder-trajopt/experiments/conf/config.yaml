defaults:
  - _self_
  - env: motion2d-p0

hydra:
  run:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# General.
seed: 0
num_eval_episodes: 50
max_eval_steps: 200
make_videos: False
video_folder: ${hydra:runtime.output_dir}/videos

# Predictive sampling hyperparameters.
horizon: 50
num_rollouts: 100
noise_scale: 1.0
num_control_points: 10
warm_start: true
