defaults:
  - _self_
  - env: motion2d-p0

hydra:
  run:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job_logging:
    root:
      level: ${log_level}

log_level: INFO

# General.
seed: 0
num_eval_episodes: 50
make_videos: False
video_folder: ${hydra:runtime.output_dir}/videos

# Predictive sampling hyperparameters.
horizon: 100
num_rollouts: 50
noise_fraction: 1.0  # noise std = noise_fraction * action_range, per dimension
num_control_points: 10
warm_start: true
replan_interval: 1
