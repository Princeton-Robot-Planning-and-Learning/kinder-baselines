<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinDER Blockly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Press Start 2P', monospace;
            height: 100vh; display: flex; flex-direction: column;
            background: var(--bg); color: var(--text);
            image-rendering: pixelated;
        }

        :root {
            --bg:        #080312;
            --panel:     #0f0525;
            --surface:   #1a0a3d;
            --border:    #7c3aed;
            --accent:    #9160ee;
            --highlight: #b883fa;
            --pink:      #a56cf0;
            --gold:      #ffd60a;
            --text:      #f3e8ff;
            --muted:     #8a80b0;
            --px:        3px;
        }

        .retro-border {
            border: var(--px) solid var(--border);
            box-shadow:
                var(--px) var(--px) 0 var(--border),
                calc(-1 * var(--px)) calc(-1 * var(--px)) 0 rgba(124,58,237,.25);
        }

        /* ── Header ──────────────────────────────────────── */
        header {
            background: var(--panel); padding: 10px 16px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            border-bottom: var(--px) solid var(--border);
        }
        header h1 {
            font-size: 14px; color: var(--accent);
            text-shadow: 2px 2px 0 #2e1065;
        }
        #run-btn {
            font-family: 'Press Start 2P', monospace;
            background: var(--accent); color: white; border: none;
            padding: 8px 18px; font-size: 10px; cursor: pointer;
            border: var(--px) solid #7c3aed;
            box-shadow: var(--px) var(--px) 0 #4c1d95;
            transition: transform 0.05s;
        }
        #run-btn:hover { transform: translate(-1px, -1px); }
        #run-btn:active { transform: translate(var(--px), var(--px)); box-shadow: none; }
        #run-btn:disabled { background: #2a1d4e; border-color: #1e1040; box-shadow: none; cursor: not-allowed; }
        #challenge-select {
            font-family: 'Press Start 2P', monospace;
            padding: 6px 8px; font-size: 9px; border: var(--px) solid var(--border);
            background: var(--surface); color: var(--highlight); cursor: pointer;
        }
        #challenge-hint { font-size: 8px; color: var(--muted); max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #status { font-size: 8px; color: var(--highlight); }

        /* ── Layout ──────────────────────────────────────── */
        .content { display: flex; flex: 1; overflow: hidden; }
        #blockly-area { flex: 2; position: relative; background: var(--bg); }
        #blockly-div { position: absolute; inset: 0; }

        #output-panel {
            flex: 1; background: var(--panel); display: flex; flex-direction: column;
            align-items: center; padding: 10px; gap: 8px; overflow-y: auto;
            border-left: var(--px) solid var(--border);
        }
        .panel-label {
            font-size: 8px; color: var(--highlight); text-transform: uppercase;
            letter-spacing: 1px; text-shadow: 1px 1px 0 rgba(0,0,0,.5);
        }
        #frame-display { max-width: 100%; max-height: 38%; background: #000; }
        #frame-info { font-size: 8px; color: var(--muted); }

        /* ── Canvases ────────────────────────────────────── */
        #canvas-row { display: flex; gap: 8px; align-items: flex-start; }
        .canvas-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .canvas-col canvas { background: #06020f; }

        /* ── Score ───────────────────────────────────────── */
        #score-box {
            display: none; text-align: center; padding: 8px 14px; font-size: 12px;
        }
        #score-box.good {
            background: var(--accent); color: white; display: block;
            box-shadow: var(--px) var(--px) 0 #5b21b6;
        }
        #score-box.ok {
            background: #7c3aed; color: white; display: block;
            box-shadow: var(--px) var(--px) 0 #5b21b6;
        }
        #score-box.poor {
            background: #3b1768; color: var(--highlight); display: block;
            box-shadow: var(--px) var(--px) 0 #2e1065;
        }
        #score-detail { font-size: 7px; font-weight: 400; margin-top: 4px; opacity: 0.8; }

        /* ── Tamagotchi ──────────────────────────────────── */
        #tama-container {
            position: fixed; bottom: 16px; right: 16px; z-index: 1000;
            display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
            pointer-events: none;
        }
        #tama-bubble {
            background: var(--surface); color: var(--text);
            border: var(--px) solid var(--accent);
            box-shadow: var(--px) var(--px) 0 rgba(145,96,238,.35);
            padding: 10px 14px; font-size: 10px; line-height: 1.6;
            max-width: 240px; position: relative;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.3s, transform 0.3s;
        }
        #tama-bubble.visible { opacity: 1; transform: translateY(0); }
        #tama-bubble::after {
            content: ''; position: absolute; bottom: -8px; right: 20px;
            width: 0; height: 0;
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-top: 8px solid var(--accent);
        }
        #tama-bot {
            width: 48px; height: 54px; position: relative;
            pointer-events: auto; cursor: pointer;
            animation: tama-bounce 1.2s ease-in-out infinite;
        }
        @keyframes tama-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /*
         * Pixel-art Franka-style arm robot (front view).
         *
         *   Row 0:  two eyes (gold)
         *   Row 1:  gripper/face (4 wide)
         *   Row 2:  wrist (2 wide)
         *   Row 3-4: forearm link (4 wide, lighter)
         *   Row 5:  elbow joint (6 wide, accent)
         *   Row 6-8: upper arm (2 wide)
         *   Row 9:  shoulder joint (6 wide, accent)
         *  Row 10: base top (8 wide)
         *  Row 11: base bottom (10 wide)
         */
        #tama-pixel {
            position: absolute; top: 0; left: 0;
            width: 3px; height: 3px; background: transparent;
            box-shadow:
                /* row 0 — eyes */
                18px 0px var(--gold), 27px 0px var(--gold),
                /* row 1 — gripper head */
                15px 3px var(--text), 18px 3px var(--highlight),
                21px 3px var(--pink), 24px 3px var(--highlight), 27px 3px var(--text),
                /* row 2 — wrist */
                21px 6px var(--muted), 24px 6px var(--muted),
                /* row 3 — forearm */
                18px 9px var(--text), 21px 9px var(--text),
                24px 9px var(--text), 27px 9px var(--text),
                /* row 4 — forearm */
                18px 12px var(--text), 21px 12px var(--text),
                24px 12px var(--text), 27px 12px var(--text),
                /* row 5 — elbow joint */
                12px 15px var(--accent), 15px 15px var(--accent),
                18px 15px var(--accent), 21px 15px var(--accent),
                24px 15px var(--accent), 27px 15px var(--accent),
                30px 15px var(--accent),
                /* row 6 — upper arm */
                21px 18px var(--text), 24px 18px var(--text),
                /* row 7 — upper arm */
                21px 21px var(--text), 24px 21px var(--text),
                /* row 8 — upper arm */
                21px 24px var(--text), 24px 24px var(--text),
                /* row 9 — shoulder joint */
                12px 27px var(--accent), 15px 27px var(--accent),
                18px 27px var(--accent), 21px 27px var(--accent),
                24px 27px var(--accent), 27px 27px var(--accent),
                30px 27px var(--accent),
                /* row 10 — base top */
                9px 30px var(--muted), 12px 30px var(--muted),
                15px 30px var(--muted), 18px 30px var(--muted),
                21px 30px var(--muted), 24px 30px var(--muted),
                27px 30px var(--muted), 30px 30px var(--muted),
                33px 30px var(--muted),
                /* row 11 — base bottom */
                6px 33px var(--border), 9px 33px var(--border),
                12px 33px var(--border), 15px 33px var(--border),
                18px 33px var(--border), 21px 33px var(--border),
                24px 33px var(--border), 27px 33px var(--border),
                30px 33px var(--border), 33px 33px var(--border),
                36px 33px var(--border);
        }

        /* ── Scanlines ───────────────────────────────────── */
        body::after {
            content: ''; position: fixed; inset: 0; z-index: 9999;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.05) 0px,
                rgba(0,0,0,0.05) 1px,
                transparent 1px,
                transparent 3px
            );
        }
    </style>
</head>
<body>
    <header>
        <h1>KinDER Blockly</h1>
        <button id="run-btn" onclick="runProgram()">&#9654; RUN</button>
        <select id="challenge-select" onchange="onChallengeChange()">
            <option value="">FREE DRAW</option>
        </select>
        <span id="challenge-hint"></span>
        <span id="status"></span>
    </header>
    <div class="content">
        <div id="blockly-area">
            <div id="blockly-div"></div>
        </div>
        <div id="output-panel">
            <span class="panel-label">// 3D VIEW</span>
            <img id="frame-display" class="retro-border" alt="Robot view" />
            <div id="frame-info">DRAG BLOCKS AND CLICK RUN</div>

            <div id="canvas-row">
                <div class="canvas-col">
                    <span class="panel-label">// TARGET</span>
                    <canvas id="target-canvas" class="retro-border" width="220" height="220"></canvas>
                </div>
                <div class="canvas-col">
                    <span class="panel-label">// YOUR DRAWING</span>
                    <canvas id="trail-canvas" class="retro-border" width="220" height="220"></canvas>
                </div>
            </div>
            <div id="score-box" class="retro-border"></div>
        </div>
    </div>

    <!-- Tamagotchi advisor -->
    <div id="tama-container">
        <div id="tama-bubble"></div>
        <div id="tama-bot" onclick="tamaPoke()" title="Click me!">
            <div id="tama-pixel"></div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Movement" colour="260">
            <block type="move_base_to_target"></block>
        </category>
        <category name="Pen" colour="310">
            <block type="set_pen_color"></block>
            <block type="pen_down"></block>
            <block type="pen_up"></block>
        </category>
    </xml>

    <script src="/static/blocks.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
