<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinDER Blockly</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { background: #2c3e50; color: white; padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
        header h1 { font-size: 18px; font-weight: 600; }
        #run-btn {
            background: #27ae60; color: white; border: none; padding: 8px 20px;
            border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600;
        }
        #run-btn:hover { background: #219a52; }
        #run-btn:disabled { background: #95a5a6; cursor: not-allowed; }
        #status { font-size: 13px; color: #bdc3c7; }
        .content { display: flex; flex: 1; overflow: hidden; }
        #blockly-area { flex: 2; position: relative; }
        #blockly-div { position: absolute; inset: 0; }
        #output-panel { flex: 1; background: #ecf0f1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #frame-display { max-width: 100%; max-height: 80%; border: 2px solid #bdc3c7; background: #2c3e50; }
        #frame-info { margin-top: 10px; font-size: 13px; color: #7f8c8d; }
    </style>
</head>
<body>
    <header>
        <h1>KinDER Blockly</h1>
        <button id="run-btn" onclick="runProgram()">Run</button>
        <span id="status"></span>
    </header>
    <div class="content">
        <div id="blockly-area">
            <div id="blockly-div"></div>
        </div>
        <div id="output-panel">
            <img id="frame-display" alt="Robot view" />
            <div id="frame-info">Drag blocks and click Run</div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Skills" colour="210">
            <block type="move_base_to_target"></block>
        </category>
    </xml>

    <script src="/static/blocks.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
