hydra:
  run:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# General.
seed: 0
num_demos: 1
num_eval_episodes: 50
max_eval_steps: 3000
make_videos: False
video_folder: ${hydra:runtime.output_dir}/videos

# Environment.
defaults:
  - _self_
  - env: base_motion3d
