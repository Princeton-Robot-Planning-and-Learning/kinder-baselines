# @package _global_

# Environment-specific configuration (nested under 'env' key)
env:
  # Used to refer to the family of environments, e.g., with different numbers of objects.
  env_name: "transport3d"

  # Passed into kinder.make() to create the environment.
  make_kwargs:
    id: "kinder/Transport3D-o1-v0"

  # Passed into create_bilevel_planning_models() to create the env models.
  env_model_kwargs:
    num_objects: 1

# Global parameter overrides (at root level)
max_skill_horizon: 1000
