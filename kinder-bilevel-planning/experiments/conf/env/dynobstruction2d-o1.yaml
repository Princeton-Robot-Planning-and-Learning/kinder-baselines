# Used to refer to the family of environments, e.g., with different numbers of objects.
env_name: "dynobstruction2d"

# Passed into kinder.make() to create the environment.
make_kwargs:
  id: "kinder/DynObstruction2D-o1-v0"

# Passed into create_bilevel_planning_models() to create the env models.
env_model_kwargs:
  num_obstructions: 1

# Approach.
max_eval_steps: 200
max_abstract_plans: 20
samples_per_step: 10
max_skill_horizon: 100
heuristic_name: "hff"
planning_timeout: 60  # seconds