# PPO agent configuration for TidyBot3D (tool_use tasks)
name: ppo

# Core training parameters
args:
  total_timesteps: 1000000
  num_envs: 16
  num_steps: 512
  num_eval_envs: 1
  hidden_size: 256
  async_envs: true  # Use AsyncVectorEnv for faster parallel stepping

# Training settings
torch_deterministic: true
cuda: false

# Logging settings
exp_name: "ppo_shelf3d_train"
tb_log_dir: "runs"
