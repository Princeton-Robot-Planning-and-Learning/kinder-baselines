# SAC agent configuration for Transport3D
name: sac

# Core training parameters
args:
  total_timesteps: 1000000
  num_eval_envs: 1
  hidden_size: 128
  num_envs: 8
  buffer_size: 100000
  learning_starts: 5000
  async_envs: true  # Use AsyncVectorEnv for faster parallel stepping
  dense_reward: false
  dense_reward_scale: 0.1
  
# Training settings
torch_deterministic: true
cuda: false

# Logging settings
exp_name: "sac_transport3d_train"
tb_log_dir: "runs"
