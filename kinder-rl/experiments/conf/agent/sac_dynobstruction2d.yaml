# SAC agent configuration for DynObstruction2D
name: sac

# Core training parameters
args:
  total_timesteps: 1000000
  num_eval_envs: 1
  num_envs: 8
  hidden_size: 128
  buffer_size: 100000
  learning_starts: 5000
  
# Training settings
torch_deterministic: true
cuda: false

# Logging settings
exp_name: "sac_dynobstruction2d_train"
tb_log_dir: "runs"
